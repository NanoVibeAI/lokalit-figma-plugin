<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: #333;
      background: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #root { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    /* ── Typography ─────────────────────────────── */
    h1 { font-size: 15px; font-weight: 600; color: #111; }
    h2 { font-size: 13px; font-weight: 600; color: #111; }
    p  { color: #666; line-height: 1.5; }
    .muted { color: #999; font-size: 11px; }

    /* ── Layout ─────────────────────────────────── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 8px;
    }
    .stack { display: flex; flex-direction: column; gap: 8px; }
    .row   { display: flex; align-items: center; gap: 8px; }
    .fill  { flex: 1; }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #e8e8e8;
      gap: 8px;
    }
    .header h1 { flex: 1; font-size: 13px; }
    .icon-btn {
      width: 28px; height: 28px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #666;
      font-size: 16px;
    }
    .icon-btn:hover { background: #f0f0f0; }

    /* ── Scrollable body ────────────────────────── */
    .body { flex: 1; overflow-y: auto; padding: 12px; }

    /* ── Buttons ─────────────────────────────────── */
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary   { background: #18a0fb; color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-danger    { background: #fff; color: #e53e3e; border: 1px solid #e53e3e; }
    .btn-sm        { padding: 5px 10px; font-size: 11px; }
    .btn-full      { width: 100%; }

    /* ── Form controls ───────────────────────────── */
    label { font-size: 11px; font-weight: 500; color: #555; display: block; margin-bottom: 4px; }
    select, input[type=text] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 12px;
      color: #333;
      background: #fff;
      outline: none;
    }
    select:focus, input[type=text]:focus { border-color: #18a0fb; }

    /* ── Cards ───────────────────────────────────── */
    .card { border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
    .card-body { padding: 12px; }

    /* ── Node list ───────────────────────────────── */
    .node-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .node-row:last-child { border-bottom: none; }
    .node-text { font-size: 11px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .node-name { font-size: 10px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge-assigned   { background: #e6f4ea; color: #2e7d32; font-size: 10px; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .badge-unresolved { background: #fff8e1; color: #e65100; font-size: 10px; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
    .badge-unassigned { background: #f5f5f5; color: #888; font-size: 10px; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }

    /* ── Spinner ─────────────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e0e0e0;
      border-top-color: #18a0fb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Banner ──────────────────────────────────── */
    .banner {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      font-size: 11px;
      color: #6d4c00;
    }
    .banner a { color: #18a0fb; cursor: pointer; text-decoration: underline; }

    /* ── Overlay dialog ──────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-end;
      z-index: 100;
    }
    .dialog {
      background: #fff;
      border-radius: 12px 12px 0 0;
      width: 100%;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .dialog h2 { font-size: 14px; }

    /* ── Error ───────────────────────────────────── */
    .error { color: #c0392b; font-size: 11px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>__UI_BUNDLE__</script>
</body>
</html>
